<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/Application-management/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Student Application Management CRM for higher studies in Germany" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <title>Student CRM</title>
  <script type="module" crossorigin src="/Application-management/assets/index-CjG-FyYb.js"></script>
  <link rel="stylesheet" crossorigin href="/Application-management/assets/index-DBk3eHGv.css">
</head>

<body>
  <div id="root"></div>
  <script>
    // Production-only: Disable right-click, DevTools shortcuts, text selection
    if (location.hostname !== 'localhost') {
      // Disable right-click
      document.addEventListener('contextmenu', function (e) { e.preventDefault(); });

      // Block DevTools shortcuts
      document.addEventListener('keydown', function (e) {
        // F12
        if (e.key === 'F12') { e.preventDefault(); return false; }
        // Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && ['I', 'J', 'C'].includes(e.key.toUpperCase())) { e.preventDefault(); return false; }
        // Ctrl+U (View Source)
        if (e.ctrlKey && e.key.toUpperCase() === 'U') { e.preventDefault(); return false; }
      });

      // Disable text selection (prevents copying page content)
      document.addEventListener('selectstart', function (e) {
        // Allow selection inside input/textarea
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
        e.preventDefault();
      });
    }
  </script>
</body>

</html>
